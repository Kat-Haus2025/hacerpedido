<!DOCTYPE html>
<html lang="es">
<head>

<!-- META PIXEL -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', 'TU_PIXEL_ID');
fbq('track', 'PageView');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selecciona tu Gatificación</title>

<style>

body{
background:#12100e;
color:#fff;
font-family:sans-serif;
text-align:center;
padding:20px;
}

h1{
color:#f1c40f;
margin-bottom:10px;
}

p{
color:#bbb;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
max-width:700px;
margin:auto;
}

.card{
background:#1e1b17;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:.25s;
}

.card:hover{
transform:scale(1.05);
}

/* 🔴 BAJO VALOR */
.low{
opacity:0.6;
}

/* 🟢 ALTO VALOR */
.high{
border:2px solid #c49546;
}

img{
width:100%;
border-radius:6px;
}

.title{
color:#f1c40f;
font-size:0.9rem;
margin-top:8px;
}

.price{
font-size:0.85rem;
color:#ccc;
}

#msg{
margin-top:20px;
font-size:0.9rem;
color:#ccc;
display:none;
}

</style>

</head>

<body>

<h1>Selecciona tu nivel de Gatificación</h1>

<p>Trabajamos soluciones estructurales personalizadas.  
No todos los presupuestos aplican.</p>

<div class="grid">

<!-- 🔥 PREMIUM -->
<div class="card high" onclick="goHigh()">
<img src="deidad.png">
<div class="title">Michi Deidad</div>
<div class="price">Sin límites</div>
</div>

<div class="card high" onclick="goHigh()">
<img src="emperador.png">
<div class="title">Michi Emperador</div>
<div class="price">$400–$500</div>
</div>

<div class="card high" onclick="goHigh()">
<img src="magnate.png">
<div class="title">Michi Magnate</div>
<div class="price">$300–$399</div>
</div>

<!-- ⚠️ FILTRO -->
<div class="card low" onclick="reject()">
<img src="aristocrata.png">
<div class="title">Michi Aristócrata</div>
<div class="price">$200–$299</div>
</div>

<div class="card low" onclick="reject()">
<img src="oficinista.png">
<div class="title">Michi Oficinista</div>
<div class="price">$150–$199</div>
</div>

<div class="card low" onclick="reject()">
<img src="estudiante.png">
<div class="title">Michi Estudiante</div>
<div class="price">$100–$149</div>
</div>

</div>

<div id="msg"></div>

<script>

function goHigh(){
  fbq('track', 'QualifiedLead'); // 🔥 señal de cliente bueno
  window.location.href = "contacto.html";
}

function reject(){
  fbq('track', 'LowIntent'); // ❌ entrenas a Meta a evitarlos

  let msg = document.getElementById("msg");
  msg.style.display = "block";
  msg.innerHTML = `
  Nuestros circuitos están diseñados como soluciones estructurales personalizadas,
  no como productos individuales.<br><br>
  Si buscas algo dentro de este rango, probablemente no seamos la mejor opción.
  `;
}

</script>

</body>
</html>
