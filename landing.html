<!DOCTYPE html>
<html lang="es">
<head>

<!-- META PIXEL -->
<script>
!function(f,b,e,v,n,t,s)
{if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)}(window, document,'script',

fbq('init', '649645208209657');

</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configura tu Gatificación</title>

<style>

body{
background:#514033;
color:#fff;
font-family:sans-serif;
margin:0;
}

/* 🔥 BANNER */
.top-banner{
background:linear-gradient(90deg,#000,#3a2a1a,#000);
padding:12px;
text-align:center;
font-size:0.9rem;
font-weight:bold;
color:#f1c40f;
letter-spacing:0.03em;
box-shadow:0 0 15px rgba(0,0,0,0.6);
animation:fadeGlow 2s infinite alternate;
}

@keyframes fadeGlow{
from{opacity:0.7;}
to{opacity:1;}
}

/* HEADER */
.header img{
width:100%;
display:block;
}

.container{
padding:20px;
text-align:center;
}

h1{
color:#f1c40f;
font-size:1.6rem;
margin-bottom:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
max-width:900px;
margin:auto;
}

@media(max-width:900px){
.grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
.grid{grid-template-columns:1fr;}
}

/* CARD */
.card{
background:#1c1915;
padding:12px;
border-radius:10px;
cursor:pointer;
border:1px solid #2a2622;
transition:.2s;
}

.card.selected{
border:2px solid #c49546;
box-shadow:0 0 10px rgba(196,149,70,0.4);
}

/* 🫀 LATIDO */
.card img{
width:100%;
border-radius:6px;
animation:heartbeat 2.5s infinite;
}

@keyframes heartbeat{
0%{transform:scale(1);}
10%{transform:scale(1.04);}
20%{transform:scale(1);}
30%{transform:scale(1.06);}
40%{transform:scale(1);}
100%{transform:scale(1);}
}

.title{
color:#f1c40f;
margin-top:6px;
}

.price{
color:#ccc;
font-size:0.85rem;
}

/* UBICACIÓN */
.location-banner{
margin-top:30px;
max-width:600px;
margin:auto;
background:#181512;
border-radius:14px;
padding:20px;
}

.location-options{
display:flex;
flex-direction:column;
gap:10px;
text-align:left;
}

.location-option{
background:#211d19;
padding:10px;
border-radius:8px;
cursor:pointer;
}

.location-option.selected{
border:1px solid #c49546;
background:#2a241d;
}

/* BOTÓN */
.btn{
margin:30px auto;
background:#25D366;
color:#fff;
padding:14px;
border-radius:10px;
font-weight:bold;
width:100%;
max-width:380px;
opacity:0.6;
transition:.3s;
border:none;
cursor:pointer;
}

.btn.active{
opacity:1;
transform:scale(1.05);
}

</style>

</head>

<body>

<!-- 🔥 BANNER -->
<div class="top-banner">
🐾 “Me salté las papitas del recreo… pero estoy invirtiendo.”
</div>

<div class="header">
<img src="profesional.png">
</div>

<div class="container">

<h1>Selecciona tu Gategoría</h1>

<div class="grid">

<div class="card" onclick="selectTier(this,'Deidad')">
<img src="tier6.png">
<div class="title">Michi Deidad</div>
<div class="price">Sin límites</div>
</div>

<div class="card" onclick="selectTier(this,'Emperador')">
<img src="tier5.png">
<div class="title">Michi Emperador</div>
<div class="price">$301–$350</div>
</div>

<div class="card" onclick="selectTier(this,'Magnate')">
<img src="tier4.png">
<div class="title">Michi Magnate</div>
<div class="price">$250–$300</div>
</div>

<div class="card" onclick="selectTier(this,'Aristócrata')">
<img src="tier3.png">
<div class="title">Michi Aristócrata</div>
<div class="price">$201–$250</div>
</div>

<div class="card" onclick="selectTier(this,'Oficinista')">
<img src="tier2.png">
<div class="title">Michi Oficinista</div>
<div class="price">$151–$200</div>
</div>

<div class="card" onclick="selectTier(this,'Estudiante')">
<img src="tier1.png">
<div class="title">Michi Estudiante</div>
<div class="price">$100–$150</div>
</div>

</div>

<!-- UBICACIÓN -->
<div class="location-banner">

<h3>Ubicación</h3>

<div class="location-options">

<label class="location-option">
<input type="radio" name="loc" value="Quito"> Quito
</label>

<label class="location-option">
<input type="radio" name="loc" value="Guayaquil"> Guayaquil
</label>

<label class="location-option">
<input type="radio" name="loc" value="Otra ciudad"> Otra ciudad
</label>

</div>

</div>

<button class="btn" id="ctaBtn" onclick="enviar()">
Selecciona opciones para continuar
</button>

</div>

<script>

let selectedTier = null;
let selectedLoc = null;

// TIER
function selectTier(el,tier){
document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
el.classList.add("selected");
selectedTier = tier;
activar();
}

// UBICACIÓN
document.querySelectorAll(".location-option").forEach(opt=>{
opt.addEventListener("click",()=>{
document.querySelectorAll(".location-option").forEach(o=>o.classList.remove("selected"));
opt.classList.add("selected");
selectedLoc = opt.querySelector("input").value;
activar();
});
});

// ACTIVAR BOTÓN
function activar(){
if(selectedTier && selectedLoc){
document.getElementById("ctaBtn").classList.add("active");
}
}

// ENVÍO + PIXEL INTELIGENTE
function enviar(){

if(!selectedTier || !selectedLoc) return;

// 🔥 FILTRO
if(["Aristócrata","Magnate","Emperador","Deidad"].includes(selectedTier)){

fbq('track','Lead',{
value:5,
currency:'USD',
tier:selectedTier
});

fbq('trackCustom','HighValueClient',{tier:selectedTier});

}else{

fbq('trackCustom','LowBudget',{tier:selectedTier});

}

// WHATSAPP
let msg = `Hola Ale, quiero una gatificación tipo ${selectedTier}. Estoy en ${selectedLoc}.`;

window.location.href = "https://wa.me/593963372269?text="+encodeURIComponent(msg);

}

</script>

</body>
</html>
